# Backend selection — flip the existing redis-backed example onto NATS by
# setting backend=nats and pointing rqueue.nats.connection.url at a JetStream-
# enabled server. Everything else (queue names, listeners, controller) is
# identical to the redis example, which is the point of the pluggable split.
rqueue.backend=nats

# NATS / JetStream connection. Default is the public-binding nats-server URL
# from a vanilla `nats-server -js` install. For docker, point at the running
# container instead (e.g. nats://nats:4222).
rqueue.nats.connection.url=nats://localhost:4222

# Provisioning flags. Defaults are true (auto-create on first use); flip any
# to false in restricted JetStream accounts and pre-create the streams /
# buckets per the README.
rqueue.nats.auto-create-streams=true
rqueue.nats.auto-create-consumers=true
rqueue.nats.auto-create-dlq-stream=true
rqueue.nats.auto-create-kv-buckets=true

# Queue names. Same defaults as the redis example minus the two delayed
# queues — v1 NATS doesn't model delayed delivery, so a delay-queue listener
# wouldn't have anything to redeliver from.
rqueue.simple.queue=simple-queue

job.fail.percentage=30
job.execution.interval=2000

# Standard actuator + Prometheus export wiring; identical to the redis example.
rqueue.metrics.tags.suite=JMeter
rqueue.metrics.count.failure=true
rqueue.metrics.count.execution=true
management.prometheus.metrics.export.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.beans.enabled=true
management.endpoint.health.enabled=true

workers.count=100
scale.enabled=true
