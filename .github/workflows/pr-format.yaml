name: Format PR Code

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - master
    paths:
      - "**/*.java"

permissions:
  contents: write

jobs:
  format:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Expose Java 21 to Gradle toolchains
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_JAVA_INSTALLATIONS_PATHS=$JAVA_HOME" >> "$GITHUB_ENV"
          java -version
          javac -version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format Java sources
        run: ./gradlew formatJava

      - name: Commit formatted changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Palantir Java Format"
          git push
